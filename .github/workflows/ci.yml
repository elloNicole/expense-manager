name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=backend" >> $GITHUB_ENV

      - name: Run tests
        run: pytest backend